services:
  bot:
    build: .
    container_name: netwatch-bot
    env_file: .env
    environment:
      - DATA_DIR=/app/data
    volumes:
      - bot-data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - netwatch

  n8n:
    image: n8nio/n8n:latest
    container_name: netwatch-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - GENERIC_TIMEZONE=Europe/Berlin
    restart: unless-stopped
    networks:
      - netwatch

volumes:
  bot-data:
  n8n-data:

networks:
  netwatch:
    driver: bridge
